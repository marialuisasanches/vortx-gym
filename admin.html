<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Varela&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/admin.css" />

    <title>Administrador</title>
  </head>
  <body>
    <header>
      <h1>Vortx Administrator</h1>
    </header>
    <main>
      <h2 class="control">User Control</h2>

      <section class="cards">
        <h2>Estatísticas</h2>

        <div class="card">
          <h3>Total de Usuários</h3>
          <p>0</p>
        </div>
        <div class="card">
          <h3>Ativos</h3>
          <p>0</p>
        </div>
        <div class="card">
          <h3>Admins</h3>
          <p>0</p>
        </div>
        <div class="card">
          <h3>Banidos</h3>
          <p>0</p>
        </div>
      </section>

      <div class="usuario">
        <div class="buscar">
          <input type="text" placeholder="Buscar usuário..." />
          <button>Buscar</button>
        </div>
        <button class="addUsuario">Add usuário</button>
      </div>

      <div class="tabela-wrapper">
        <table class="tabela-alunos">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr></tr>
          </tbody>
        </table>
      </div>
    </main>
    <footer>
      <p>&copy; 2026 Vortx</p>
    </footer>
    <script src="./assets/js/"></script>
  </body>
</html>
